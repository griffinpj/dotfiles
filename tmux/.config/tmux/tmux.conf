# <leader> => ctl + b
# Notes:
#   (bind-key = bind)
#     `bind-key`    binds once
#     `bind-key -r` binds for repeated key presses
#     `bind-key -n` binds for non-blocking keypresses (no prefix needed)

# -- Terminal / nvim correctness --
set -g escape-time 10                        # kill ESC lag in nvim
set -g focus-events on                       # nvim autoread / focus events
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"    # true color
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000

# -- Copy mode (vi) --
set -g status-keys vi
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi 'v' send-keys -X begin-selection
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'pbcopy'

# -- Mode indicator (tmux-mode-indicator plugin) --
set -g @mode_indicator_prefix_prompt ' WAIT '
set -g @mode_indicator_copy_prompt ' COPY '
set -g @mode_indicator_sync_prompt ' SYNC '
set -g @mode_indicator_empty_prompt ' TMUX '
set -g @mode_indicator_prefix_mode_style 'bg=blue,fg=black'
set -g @mode_indicator_copy_mode_style 'bg=yellow,fg=black'
set -g @mode_indicator_sync_mode_style 'bg=red,fg=black'
set -g @mode_indicator_empty_mode_style 'bg=cyan,fg=black'

# -- Theme: Catppuccin (colors owned by plugin) --
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g status-left-length 30
set -g status-right-length 100
set -g status-left ''
set -g status-right '#{E:@catppuccin_status_session} '
set -ga status-right '#{tmux_mode_indicator}'
set -g status-interval 60

# -- Navigation --
# splitting panes (inherit current dir)
unbind-key Left
unbind-key Down
unbind-key Up
unbind-key Right
bind -r Left  split-window -h -c "#{pane_current_path}"
bind -r Down  split-window -v -c "#{pane_current_path}"
bind -r Up    split-window -v -c "#{pane_current_path}"
bind -r Right split-window -h -c "#{pane_current_path}"

# selecting panes (note: C-h/j/k/l handled by vim-tmux-navigator)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# swap panes (moved off C-j/C-k to avoid vim-tmux-navigator conflict)
bind < swap-pane -U
bind > swap-pane -D

# resizing panes
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# session switcher (sesh + fzf)
bind -N "session switcher" s run-shell "sesh connect \"$(sesh list | fzf-tmux -p 60%,50%)\""

# reload tmux config with <leader> r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "~/.config/tmux/tmux.conf reloaded"

# -- Plugins (TPM) --
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'sainnhe/tmux-fzf'

# keep this line last
run '~/.tmux/plugins/tpm/tpm'
